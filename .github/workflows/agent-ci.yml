name: Agent CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build default release artifacts
        run: |
          VERSION=ci-${GITHUB_SHA::7} ./scripts/build-nodeping-agent.sh

      - name: Build Docker image
        run: |
          VERSION=ci-${GITHUB_SHA::7} IMAGE=nodeping-agent ./scripts/build-nodeping-agent-image.sh
