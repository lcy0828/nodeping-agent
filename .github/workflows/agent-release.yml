name: Agent Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Annotated Agent release tag to publish
        required: true
        type: string
      confirm_incompatible_upgrade:
        description: Exact incompatible-upgrade confirmation required by the compatibility gate
        required: false
        type: string

permissions:
  contents: write
  packages: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

concurrency:
  group: agent-release-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - name: Verify agent release tag
        run: ./scripts/release-tag.sh verify agent "$RELEASE_TAG"

      - name: Enforce previous-version upgrade compatibility
        env:
          NODEPING_AGENT_RELEASE_TRIGGER: ${{ github.event_name }}
          NODEPING_AGENT_RELEASE_ACTOR: ${{ github.actor }}
          NODEPING_AGENT_INCOMPATIBLE_CONFIRMATION: ${{ inputs.confirm_incompatible_upgrade }}
        run: ./scripts/agent-upgrade-compatibility.sh gate "$RELEASE_TAG"

      - name: Lint workflows and shell scripts
        run: ./scripts/ci/lint-agent-workflows.sh

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test Agent upgrade and Docker supervisor behavior
        run: go test -count=1 ./cmd/nodeping-agent ./deploy/nodeping-agent

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify previous-version Docker image probes
        run: ./scripts/ci/test-agent-image-compatibility.sh "$RELEASE_TAG"

      - name: Install native supply-chain dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binutils \
            build-essential \
            ca-certificates \
            cmake \
            curl \
            gnupg \
            openssl \
            patch \
            perl \
            pkg-config \
            xz-utils

      - name: Verify pinned dnstap supply chain
        run: go run ./scripts/verify-dnstap-supply-chain.go

      - name: Verify upstream source signatures
        run: ./scripts/ci/verify-unbound-source-provenance.sh

      - name: Verify IANA root material
        env:
          NODEPING_ROOT_MATERIAL_OUTPUT_DIR: ${{ runner.temp }}/nodeping-root-material
        run: ./scripts/ci/verify-root-material-supply-chain.sh

      - name: Reproducibly build patched Unbound
        env:
          NODEPING_UNBOUND_OUTPUT_DIR: ${{ runner.temp }}/nodeping-unbound-helper
        run: ./scripts/ci/verify-unbound-dnstap-reproducible.sh

      - name: Verify helper manifest, licenses, and SBOMs
        run: ./scripts/ci/verify-unbound-helper-metadata.sh "${RUNNER_TEMP}/nodeping-unbound-helper"

      - name: Exercise RFC 5011 state lifecycle
        env:
          NODEPING_UNBOUND_ANCHOR_BINARY: ${{ runner.temp }}/nodeping-unbound-helper/unbound-anchor
          NODEPING_UNBOUND_CHECKCONF_BINARY: ${{ runner.temp }}/nodeping-unbound-helper/unbound-checkconf
          NODEPING_ROOT_HINTS_FILE: ${{ runner.temp }}/nodeping-root-material/named.root
        run: go test -count=1 -timeout=1m -tags=dnsroots_native_e2e -run '^TestUnboundAnchorNativeLifecycle$' ./internal/dnsroots

      - name: Exercise reproducible Unbound native dnstap shutdown
        shell: bash
        run: |
          test_binary="${RUNNER_TEMP}/dnstapcollector-native-e2e"
          CGO_ENABLED=0 go test -c -tags=unbound_native_e2e -o "${test_binary}" ./internal/dnstapcollector
          sudo env \
            NODEPING_UNBOUND_BINARY="${RUNNER_TEMP}/nodeping-unbound-helper/unbound" \
            NODEPING_UNBOUND_CHECKCONF_BINARY="${RUNNER_TEMP}/nodeping-unbound-helper/unbound-checkconf" \
            "${test_binary}" -test.run '^TestPatchedUnboundNativeDNSTapE2E$' -test.count=20 -test.timeout=5m

      - name: Build release artifacts
        env:
          VERSION: ${{ env.RELEASE_TAG }}
        run: ./scripts/build-nodeping-agent.sh

      - name: Sign release artifacts
        env:
          VERSION: ${{ env.RELEASE_TAG }}
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          test -n "$MINISIGN_SECRET_KEY"
          sudo apt-get update
          sudo apt-get install -y minisign
          key_file="$(mktemp)"
          trap 'rm -f "$key_file"' EXIT
          printf '%s\n' "$MINISIGN_SECRET_KEY" > "$key_file"
          artifact_dir="dist/nodeping-agent/${VERSION}"
          for artifact in \
            "${artifact_dir}"/nodeping-agent_"${VERSION}"_*.tar.gz \
            "${artifact_dir}/nodeping-agent_${VERSION}_checksums.txt" \
            "${artifact_dir}/nodeping-agent_${VERSION}_manifest.json"; do
            minisign -Sm "$artifact" -s "$key_file" -t "nodeping-agent ${VERSION}"
          done
          test -s "dist/nodeping-agent/${VERSION}/nodeping-agent_${VERSION}_checksums.txt.minisig"
          test -s "dist/nodeping-agent/${VERSION}/nodeping-agent_${VERSION}_manifest.json.minisig"

      - name: Upload GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            dist/nodeping-agent/${{ env.RELEASE_TAG }}/nodeping-agent_${{ env.RELEASE_TAG }}_*.tar.gz
            dist/nodeping-agent/${{ env.RELEASE_TAG }}/nodeping-agent_${{ env.RELEASE_TAG }}_*.tar.gz.minisig
            dist/nodeping-agent/${{ env.RELEASE_TAG }}/nodeping-agent_${{ env.RELEASE_TAG }}_checksums.txt
            dist/nodeping-agent/${{ env.RELEASE_TAG }}/nodeping-agent_${{ env.RELEASE_TAG }}_checksums.txt.minisig
            dist/nodeping-agent/${{ env.RELEASE_TAG }}/nodeping-agent_${{ env.RELEASE_TAG }}_manifest.json
            dist/nodeping-agent/${{ env.RELEASE_TAG }}/nodeping-agent_${{ env.RELEASE_TAG }}_manifest.json.minisig
          generate_release_notes: true

      - name: Prune non-release assets
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = process.env.RELEASE_TAG;
            const release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
            const keep = new RegExp(`^nodeping-agent_${tag}_(?:.+\\.tar\\.gz|checksums\\.txt|manifest\\.json)(?:\\.minisig)?$`);
            for (const asset of release.data.assets) {
              if (!keep.test(asset.name)) {
                core.info(`Deleting release asset ${asset.name}`);
                await github.rest.repos.deleteReleaseAsset({
                  owner,
                  repo,
                  asset_id: asset.id,
                });
              }
            }

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        env:
          VERSION: ${{ env.RELEASE_TAG }}
          IMAGE: ghcr.io/lcy0828/nodeping-agent
          PUSH: "1"
          PLATFORMS: linux/amd64,linux/arm64
        run: ./scripts/build-nodeping-agent-image.sh
