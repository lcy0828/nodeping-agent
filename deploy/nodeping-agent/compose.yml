name: nodeping-agent

services:
  nodeping-agent:
    container_name: nodeping-agent
    image: ${NODEPING_AGENT_IMAGE:-hub.ilatency.com/ghcr.io/lcy0828/nodeping-agent}:${NODEPING_AGENT_IMAGE_VERSION:-latest}
    restart: unless-stopped
    init: true
    # Root keeps NET_RAW effective even when the host restricts ping_group_range.
    user: "0:0"
    # Only the image filesystem is read-only; /tmp, runtime, and state stay writable.
    read_only: true
    stop_grace_period: ${NODEPING_AGENT_STOP_GRACE_PERIOD:-35s}
    # Child tools cannot gain privileges beyond root with the explicitly retained NET_RAW.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=16m
      - /run/nodeping-agent:rw,noexec,nosuid,nodev,size=1m,mode=0700
    environment:
      NODEPING_SERVER_URL: ${NODEPING_SERVER_URL:?set NODEPING_SERVER_URL}
      NODEPING_AGENT_ALLOW_INSECURE_HTTP: ${NODEPING_AGENT_ALLOW_INSECURE_HTTP:-false}
      NODEPING_TOKEN: ${NODEPING_TOKEN:?set NODEPING_TOKEN}
      NODEPING_AGENT_ID: ${NODEPING_AGENT_ID:-}
      NODEPING_AGENT_NAME: ${NODEPING_AGENT_NAME:-NodePing Docker Agent}
      NODEPING_INSTALL_MODE: docker
      NODEPING_AGENT_ID_FILE: /var/lib/nodeping-agent/agent-id
      NODEPING_AGENT_TOKEN_FILE: /var/lib/nodeping-agent/agent-token
      NODEPING_HEARTBEAT_INTERVAL: ${NODEPING_HEARTBEAT_INTERVAL:-20s}
      NODEPING_PUBLIC_IP_INTERVAL: ${NODEPING_PUBLIC_IP_INTERVAL:-10m}
      NODEPING_CONCURRENCY: ${NODEPING_CONCURRENCY:-10}
      NODEPING_SHUTDOWN_DRAIN_TIMEOUT: ${NODEPING_SHUTDOWN_DRAIN_TIMEOUT:-15s}
      NODEPING_AGENT_UPGRADE_MODE: ${NODEPING_AGENT_UPGRADE_MODE:-container}
      NODEPING_AGENT_PROMOTE_LEGACY_DOCKER_UPGRADE: ${NODEPING_AGENT_PROMOTE_LEGACY_DOCKER_UPGRADE:-true}
      NODEPING_AGENT_UPGRADE_SCRIPT: /usr/local/bin/nodeping-agent-update
      NODEPING_AGENT_INSTALL_PATH: /opt/nodeping-agent/nodeping-agent
      NODEPING_AGENT_BACKUP_PATH: /opt/nodeping-agent/nodeping-agent.previous
      NODEPING_AGENT_ACTIVATION_FILE: /var/lib/nodeping-agent/updates/activation.pending
      NODEPING_AGENT_ACTIVATION_STABLE_SECONDS: ${NODEPING_AGENT_ACTIVATION_STABLE_SECONDS:-20}
      NODEPING_AGENT_MINISIGN_PUBLIC_KEY: ${NODEPING_AGENT_MINISIGN_PUBLIC_KEY:-}
      NODEPING_AGENT_REQUIRE_SIGNATURE: ${NODEPING_AGENT_REQUIRE_SIGNATURE:-auto}
      NODEPING_AGENT_SIGNATURE_REQUIRED_FROM: ${NODEPING_AGENT_SIGNATURE_REQUIRED_FROM:-}
    volumes:
      - ${NODEPING_AGENT_DOCKER_RUNTIME_DIRECTORY:-./runtime}:/opt/nodeping-agent
      - ${NODEPING_AGENT_DOCKER_DATA_DIRECTORY:-./data}:/var/lib/nodeping-agent
    healthcheck:
      test: [CMD, /usr/local/lib/nodeping-agent/nodeping-agent, liveness]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: ${NODEPING_AGENT_LOG_MAX_SIZE:-10m}
        max-file: ${NODEPING_AGENT_LOG_MAX_FILES:-3}
