name: nodeping-agent

services:
  nodeping-agent:
    container_name: nodeping-agent
    image: ${NODEPING_AGENT_IMAGE:-hub.ilatency.com/ghcr.io/lcy0828/nodeping-agent}:${NODEPING_AGENT_IMAGE_VERSION:-latest}
    restart: unless-stopped
    init: true
    # Root keeps NET_RAW effective even when the host restricts ping_group_range.
    user: "0:0"
    # Only the image filesystem is read-only; /tmp and the state/control mounts stay writable.
    read_only: true
    stop_grace_period: ${NODEPING_AGENT_STOP_GRACE_PERIOD:-35s}
    # Child tools cannot gain privileges beyond root with the explicitly retained NET_RAW.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=16m
    environment:
      NODEPING_SERVER_URL: ${NODEPING_SERVER_URL:?set NODEPING_SERVER_URL}
      NODEPING_TOKEN: ${NODEPING_TOKEN:?set NODEPING_TOKEN}
      NODEPING_AGENT_ID: ${NODEPING_AGENT_ID:-}
      NODEPING_AGENT_NAME: ${NODEPING_AGENT_NAME:-NodePing Docker Agent}
      NODEPING_INSTALL_MODE: docker
      NODEPING_AGENT_ID_FILE: /var/lib/nodeping-agent/agent-id
      NODEPING_AGENT_TOKEN_FILE: /var/lib/nodeping-agent/agent-token
      NODEPING_HEARTBEAT_INTERVAL: ${NODEPING_HEARTBEAT_INTERVAL:-20s}
      NODEPING_PUBLIC_IP_INTERVAL: ${NODEPING_PUBLIC_IP_INTERVAL:-10m}
      NODEPING_CONCURRENCY: ${NODEPING_CONCURRENCY:-10}
      NODEPING_SHUTDOWN_DRAIN_TIMEOUT: ${NODEPING_SHUTDOWN_DRAIN_TIMEOUT:-15s}
      NODEPING_AGENT_UPGRADE_MODE: ${NODEPING_AGENT_UPGRADE_MODE:-disabled}
      NODEPING_AGENT_UPGRADE_REQUEST_FILE: ${NODEPING_AGENT_UPGRADE_REQUEST_FILE:-/run/nodeping-agent/update-request.json}
    volumes:
      - ${NODEPING_AGENT_DOCKER_DATA_DIRECTORY:-./data}:/var/lib/nodeping-agent
      - ${NODEPING_AGENT_DOCKER_CONTROL_DIRECTORY:-./control}:/run/nodeping-agent
    # This also works with older Agent images whose built-in liveness check
    # expected nodeping-agent itself to be PID 1.
    healthcheck:
      test:
        - CMD-SHELL
        - 'for pid in 1 $$(cat /proc/1/task/1/children 2>/dev/null); do target=$$(readlink "/proc/$$pid/exe" 2>/dev/null || true); [ "$${target##*/}" = "nodeping-agent" ] && exit 0; done; exit 1'
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: ${NODEPING_AGENT_LOG_MAX_SIZE:-10m}
        max-file: ${NODEPING_AGENT_LOG_MAX_FILES:-3}
